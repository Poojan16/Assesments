version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: pipeline_db
    environment:
      POSTGRES_DB: ${DB_NAME:-pipeline_db}
      POSTGRES_USER: ${DB_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pipeline_user} -d ${DB_NAME:-pipeline_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: pipeline_web
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python dashboard/manage.py migrate &&
             python generate_data.py --rows 5000 &&
             python dashboard/manage.py runserver 0.0.0.0:8000"

  watcher:
    build: .
    container_name: pipeline_watcher
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: python watcher/ftp_watcher.py

volumes:
  pgdata:
